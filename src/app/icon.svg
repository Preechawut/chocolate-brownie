<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#2a1f14"/>

  <!-- ear tips -->
  <rect x="2" y="1" width="2" height="1" fill="#c8b89a"/>
  <rect x="10" y="1" width="2" height="1" fill="#c8b89a"/>
  <!-- ears -->
  <rect x="1" y="2" width="4" height="1" fill="#c8b89a"/>
  <rect x="9" y="2" width="4" height="1" fill="#c8b89a"/>
  <!-- ear inner -->
  <rect x="2" y="2" width="2" height="1" fill="#e8a0a0"/>
  <rect x="10" y="2" width="2" height="1" fill="#e8a0a0"/>

  <!-- head -->
  <rect x="1" y="3" width="12" height="9" fill="#c8b89a"/>
  <!-- chin -->
  <rect x="2" y="12" width="10" height="1" fill="#c8b89a"/>
  <rect x="3" y="13" width="8"  height="1" fill="#c8b89a"/>

  <!-- eyes -->
  <rect x="3" y="6" width="2" height="2" fill="#1a1a1a"/>
  <rect x="9" y="6" width="2" height="2" fill="#1a1a1a"/>
  <!-- eye highlight -->
  <rect x="4" y="6" width="1" height="1" fill="#ffffff"/>
  <rect x="10" y="6" width="1" height="1" fill="#ffffff"/>

  <!-- nose -->
  <rect x="6" y="9"  width="2" height="1" fill="#e8a0a0"/>
  <!-- mouth -->
  <rect x="5" y="10" width="1" height="1" fill="#e8a0a0"/>
  <rect x="8" y="10" width="1" height="1" fill="#e8a0a0"/>
</svg>
